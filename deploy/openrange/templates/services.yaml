{{- range $name, $svc := .Values.services }}
{{- if and $svc.enabled $svc.ports }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.global.namePrefix }}-{{ $svc.zone }}
  labels:
    app: {{ $name }}
    {{- include "openrange.labels" $ | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ $name }}
  ports:
    {{- range $svc.ports }}
    - name: {{ .name }}
      port: {{ .port }}
      targetPort: {{ .port }}
      protocol: {{ .protocol | default "TCP" }}
    {{- end }}
---
{{- end }}
{{- end }}
