    - key: 00-base-schema.sql
      mountPath: /docker-entrypoint-initdb.d/00-base-schema.sql
      content: "CREATE DATABASE IF NOT EXISTS referral_db;\nCREATE DATABASE IF NOT\
        \ EXISTS flags;\nUSE referral_db;\n\nCREATE TABLE IF NOT EXISTS users (\n\
        \    id INT AUTO_INCREMENT PRIMARY KEY,\n    username VARCHAR(64) NOT NULL\
        \ UNIQUE,\n    password VARCHAR(255) NOT NULL,\n    email VARCHAR(128),\n\
        \    full_name VARCHAR(128),\n    role VARCHAR(64),\n    department VARCHAR(64),\n\
        \    created_at DATETIME DEFAULT CURRENT_TIMESTAMP\n);\n\nCREATE TABLE IF\
        \ NOT EXISTS patients (\n    id INT AUTO_INCREMENT PRIMARY KEY,\n    first_name\
        \ VARCHAR(64),\n    last_name VARCHAR(64),\n    dob DATE,\n    phone VARCHAR(20),\n\
        \    email VARCHAR(128),\n    insurance_id VARCHAR(64),\n    created_at DATETIME\
        \ DEFAULT CURRENT_TIMESTAMP\n);\n\nCREATE TABLE IF NOT EXISTS patient_referrals\
        \ (\n    id INT AUTO_INCREMENT PRIMARY KEY,\n    patient_id INT,\n    referring_physician\
        \ VARCHAR(128),\n    specialist VARCHAR(128),\n    reason TEXT,\n    status\
        \ VARCHAR(32) DEFAULT 'pending',\n    created_at DATETIME DEFAULT CURRENT_TIMESTAMP,\n\
        \    FOREIGN KEY (patient_id) REFERENCES patients(id)\n);\n\nCREATE TABLE\
        \ IF NOT EXISTS billing (\n    id INT AUTO_INCREMENT PRIMARY KEY,\n    patient_id\
        \ INT,\n    amount DECIMAL(10,2),\n    insurance_claim VARCHAR(64),\n    status\
        \ VARCHAR(32) DEFAULT 'pending',\n    created_at DATETIME DEFAULT CURRENT_TIMESTAMP,\n\
        \    FOREIGN KEY (patient_id) REFERENCES patients(id)\n);\n\nCREATE TABLE\
        \ IF NOT EXISTS sessions (\n    id INT AUTO_INCREMENT PRIMARY KEY,\n    user_id\
        \ INT,\n    session_token VARCHAR(128),\n    created_at DATETIME DEFAULT CURRENT_TIMESTAMP,\n\
        \    expires_at DATETIME\n);\n\nCREATE TABLE IF NOT EXISTS access_log (\n\
        \    id INT AUTO_INCREMENT PRIMARY KEY,\n    user_id INT,\n    action VARCHAR(64),\n\
        \    resource VARCHAR(128),\n    ip_address VARCHAR(45),\n    created_at DATETIME\
        \ DEFAULT CURRENT_TIMESTAMP\n);\n\nUSE flags;\nCREATE TABLE IF NOT EXISTS\
        \ secrets (\n    id INT AUTO_INCREMENT PRIMARY KEY,\n    flag_name VARCHAR(64),\n\
        \    flag VARCHAR(128),\n    created_at DATETIME DEFAULT CURRENT_TIMESTAMP\n\
        );\n\nUSE referral_db;\n"
